<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BLOOM maternal journey finite state machine</title>
  <desc id="desc">Nine pregnancy and postpartum phases used by MATERNAL ai to ask phase-aware check-in questions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07110C"/>
      <stop offset="1" stop-color="#20140F"/>
    </linearGradient>
    <linearGradient id="phase" x1="76" y1="162" x2="1120" y2="442" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93FFBC"/>
      <stop offset="0.5" stop-color="#DDFEE6"/>
      <stop offset="1" stop-color="#FFB38E"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="620" rx="40" fill="url(#bg)"/>
  <text x="68" y="82" fill="#93FFBC" font-family="Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="3">BLOOM FSM TIMELINE</text>
  <text x="68" y="130" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="40" font-weight="800">The agent never asks generic questions.</text>
  <text x="68" y="168" fill="#C6D9CE" font-family="Arial, sans-serif" font-size="18">It moves through pregnancy and postpartum states, then checks the symptoms that matter for that moment.</text>
  <path d="M119 322C219 232 317 242 414 315C520 394 625 405 727 316C818 236 921 226 1080 326" stroke="url(#phase)" stroke-width="8" stroke-linecap="round"/>
  <g font-family="Arial, sans-serif">
    <g>
      <circle cx="120" cy="322" r="30" fill="#93FFBC"/><text x="114" y="330" fill="#06100B" font-size="22" font-weight="800">1</text>
      <text x="70" y="386" fill="#FFFFFF" font-size="18" font-weight="700">Positive Test</text>
      <text x="56" y="414" fill="#C6D9CE" font-size="15">Nutrition and supplements?</text>
    </g>
    <g>
      <circle cx="242" cy="254" r="30" fill="#A8FFC9"/><text x="236" y="262" fill="#06100B" font-size="22" font-weight="800">2</text>
      <text x="204" y="190" fill="#FFFFFF" font-size="18" font-weight="700">First Scan</text>
      <text x="176" y="218" fill="#C6D9CE" font-size="15">Ultrasound completed?</text>
    </g>
    <g>
      <circle cx="372" cy="287" r="30" fill="#BCFFD6"/><text x="366" y="295" fill="#06100B" font-size="22" font-weight="800">3</text>
      <text x="306" y="356" fill="#FFFFFF" font-size="18" font-weight="700">Baby Development</text>
      <text x="315" y="384" fill="#C6D9CE" font-size="15">Movement normal?</text>
    </g>
    <g>
      <circle cx="504" cy="380" r="30" fill="#DDFEE6"/><text x="498" y="388" fill="#06100B" font-size="22" font-weight="800">4</text>
      <text x="449" y="456" fill="#FFFFFF" font-size="18" font-weight="700">Risk Detection</text>
      <text x="451" y="484" fill="#C6D9CE" font-size="15">Any risk symptoms?</text>
    </g>
    <g>
      <circle cx="634" cy="381" r="30" fill="#F0FCD7"/><text x="628" y="389" fill="#06100B" font-size="22" font-weight="800">5</text>
      <text x="566" y="456" fill="#FFFFFF" font-size="18" font-weight="700">Birth Preparation</text>
      <text x="586" y="484" fill="#C6D9CE" font-size="15">Ready for delivery?</text>
    </g>
    <g>
      <circle cx="760" cy="287" r="30" fill="#FFE1BE"/><text x="754" y="295" fill="#06100B" font-size="22" font-weight="800">6</text>
      <text x="690" y="356" fill="#FFFFFF" font-size="18" font-weight="700">Delivery Recovery</text>
      <text x="693" y="384" fill="#C6D9CE" font-size="15">Recovery progressing?</text>
    </g>
    <g>
      <circle cx="888" cy="249" r="30" fill="#FFD1AA"/><text x="882" y="257" fill="#06100B" font-size="22" font-weight="800">7</text>
      <text x="810" y="190" fill="#FFFFFF" font-size="18" font-weight="700">Emotional Adjustment</text>
      <text x="844" y="218" fill="#C6D9CE" font-size="15">How is your mood?</text>
    </g>
    <g>
      <circle cx="1004" cy="281" r="30" fill="#FFC39B"/><text x="998" y="289" fill="#06100B" font-size="22" font-weight="800">8</text>
      <text x="944" y="356" fill="#FFFFFF" font-size="18" font-weight="700">PPD Risk Window</text>
      <text x="931" y="384" fill="#C6D9CE" font-size="15">Emotionally connected?</text>
    </g>
    <g>
      <circle cx="1081" cy="326" r="30" fill="#FFB38E"/><text x="1075" y="334" fill="#06100B" font-size="22" font-weight="800">9</text>
      <text x="1000" y="456" fill="#FFFFFF" font-size="18" font-weight="700">Long-Term Wellbeing</text>
      <text x="1029" y="484" fill="#C6D9CE" font-size="15">Feeling like yourself?</text>
    </g>
  </g>
  <rect x="68" y="528" width="1064" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.1"/>
  <text x="98" y="559" fill="#DDFEE6" font-family="Arial, sans-serif" font-size="17">Each turn includes phase, history, symptoms, mood trend, and red-flag guardrails.</text>
</svg>
